<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BABY BABY BAMBOO</title>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
  >

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="titleScreen" class="screen">
    <img
      src="title.png"
      alt="BABY BABY BAMBOO"
      class="title-image"
    >

    <div class="start-text">
      PRESS START BUTTON
    </div>
  </div>

  <div id="ruleScreen" class="screen hidden">

    <h2>HOW TO PLAY</h2>

    <div class="rule-block">
      <img src="bamboo1.png" alt="小タケノコ">
      <p>
        100 POINTS<br>
        すばやく収穫！
      </p>
    </div>

    <div class="rule-block">
      <img src="bamboo2.png" alt="中タケノコ">
      <p>
        20 POINTS<br>
        早めに収穫！
      </p>
    </div>

    <div class="rule-block">
      <img src="gold_bamboo.png" alt="金タケノコ">
      <p>
        BONUS !<br>
        300 POINTS
      </p>
    </div>

    <div class="rule-block">
      <img src="bamboo3.png" alt="竹林">
      <p>
        竹林化すると<br>
        そのマスは使えない！
      </p>
    </div>

    <p class="rule-note">
      40秒でハイスコアを目指せ！
    </p>

    <div class="start-text">
      TAP TO START
    </div>

  </div>

  <div id="gameScreen" class="screen hidden">

    <div class="top-ui">
      <div id="score">SCORE 0</div>
      <div id="timer">40</div>
      <div id="phase"></div>
    </div>

    <div id="grid" class="grid"></div>

  </div>

  <div id="resultScreen" class="screen hidden">

    <div id="rank" class="rank">A</div>

    <div id="rankTitle" class="rank-title">
      タケノコ名人
    </div>

    <div id="finalScore">
      SCORE 0
    </div>

    <button id="retryButton">
      もういっかい！
    </button>

  </div>

  <script src="game.js"></script>

</body>
</html>
