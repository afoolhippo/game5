<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BABY BABY BAMBOO</title>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
  >

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TITLE -->

  <div id="titleScreen" class="screen">

    <img
      src="title.png"
      alt="BABY BABY BAMBOO"
      class="title-image"
    >

    <p class="title-rule">
      小さいタケノコほど高得点！<br>
      竹林になる前に掘りまくれ！
    </p>

    <button
      id="titleStartButton"
      class="main-start-button"
    >
      タップしてスタート
    </button>

  </div>

  <!-- GAME -->

  <div id="gameScreen" class="screen hidden">

    <button
      id="backTitleButton"
      class="back-title-button"
    >
      タイトルへ戻る
    </button>

    <div class="top-ui">

      <div id="score">
        SCORE 0
      </div>

      <div id="timer">
        40
      </div>

      <div id="phase"></div>

    </div>

    <div id="grid" class="grid"></div>

  </div>

  <!-- RESULT -->

  <div id="resultScreen" class="screen hidden">

    <img
      id="resultImage"
      class="result-image"
      src="result_normal.png"
      alt="result"
    >

    <div id="rankTitle" class="rank-title">
      タケノコ名人
    </div>

    <div id="finalScore">
      SCORE 0
    </div>

    <div class="result-buttons">

      <button id="shareButton">
        Xでシェア
      </button>

      <button id="retryButton">
        もう1回遊ぶ
      </button>

      <button id="homeButton">
        カバゲーセンへ
      </button>

    </div>

  </div>

  <script src="game.js"></script>

</body>
</html>
